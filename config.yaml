## slinky config file
# ref: https://github.com/SlinkyProject/slurm-operator/blob/main/helm/slurm/values.yaml

# shared volumeMounts
x-vm-slurm-homes: &vm_slurm_homes
  name: slurm-homes
  mountPath: /home
x-vm-davyjones-users: &vm_davyjones_users
  name: davyjones-users
  mountPath: /data/users
x-vm-davyjones-shared: &vm_davyjones_shared
  name: davyjones-shared
  mountPath: /data/shared
  readOnly: True
x-vm-wallace-references: &vm_wallace_references
  name: wallace-references
  mountPath: /data/references
  readOnly: True
x-vm-avon-novaseq6k: &vm_avon_novaseq6k
  name: avon-novaseq6k
  mountPath: /data/sequencing_runs/novaseq
  readOnly: True
x-vm-avon-nextseq2k: &vm_avon_nextseq2k
  name: avon-nextseq2k
  mountPath: /data/sequencing_runs/nextseq
  readOnly: True
x-vm-stringer-ont: &vm_stringer_ont
  name: stringer-ont
  mountPath: /data/sequencing_runs/ont
  readOnly: True
# x-vm-af3-databases: &vm_af3_databases
#   name: af3-databases
#   mountPath: /data/af3_data
#   readOnly: True

# shared volumes
x-vol-slurm-homes: &vol_slurm_homes
  name: slurm-homes
  persistentVolumeClaim:
    claimName: slurm-homes
x-vol-davyjones-users: &vol_davyjones_users
  name: davyjones-users
  persistentVolumeClaim:
    claimName: nfs-davyjones-shared
x-vol-davyjones-shared: &vol_davyjones_shared
  name: davyjones-shared
  persistentVolumeClaim:
    claimName: nfs-davyjones-shared
    readOnly: true
x-vol-wallace-references: &vol_wallace_references
  name: wallace-references
  persistentVolumeClaim:
    claimName: nfs-wallace-references
x-vol-avon-novaseq6k: &vol_avon_novaseq6k
  name: avon-novaseq6k
  persistentVolumeClaim:
    claimName: nfs-avon-novaseq6k
x-vol-avon-nextseq2k: &vol_avon_nextseq2k
  name: avon-nextseq2k
  persistentVolumeClaim:
    claimName: nfs-avon-nextseq2k
x-vol-stringer-ont: &vol_stringer_ont
  name: stringer-ont
  persistentVolumeClaim:
    claimName: nfs-stringer-ont
# x-vol-af3-databases: &vol_af3_databases
#   name: af3-databases
#   hostPath:
#     path: /mnt/af3_data
#     type: Directory

# controller
controller:
  statefulset:
    persistence:
      storageClassName: nfs-legolas-jh
  podSpec:
    nodeSelector:
      node-type: controller
  extraConfMap:
    GresTypes: gpu
configFiles:
  # pyxis: configure plugstack.conf
  # ref: https://slinky.schedmd.com/projects/slurm-operator/en/release-1.0/usage/pyxis.html
  plugstack.conf: |
    include /usr/share/pyxis/*
  gres.conf: |
    AutoDetect=nvidia

# login node config
loginsets:
  slinky:
    enabled: true
    login:
      image:
        repository: ghcr.io/slinkyproject/login-pyxis  # pyxis-enabled image
      securityContext:
        privileged: true
      lifecycle:
        postStart:
          exec:
            command:
              - /bin/bash
              - -lc
              - |
                set -e

                # create user home dirs on first login
                if ! grep -q "pam_mkhomedir.so" /etc/pam.d/sshd; then
                  echo "session required pam_mkhomedir.so skel=/etc/skel umask=0077" >> /etc/pam.d/sshd
                fi

                # install pwquality & cracklib so users can change their password via passwd
                if command -v apt-get >/dev/null 2>&1; then
                  export DEBIAN_FRONTEND=noninteractive
                  apt-get update
                  apt-get install -y --no-install-recommends libpam-pwquality cracklib-runtime
                fi

      volumeMounts:
        - name: lldap-ca
          mountPath: /etc/ssl/certs/lldap-ca.crt
          subPath: lldap-ca.crt
          readOnly: true
        - name: slurm-wrappers
          mountPath: /usr/local/bin/srun
          subPath: srun
        - name: slurm-wrappers
          mountPath: /usr/local/bin/sbatch
          subPath: sbatch
        - *vm_slurm_homes
        - *vm_davyjones_users
        - *vm_davyjones_shared
        - *vm_wallace_references
        - *vm_avon_novaseq6k
        - *vm_avon_nextseq2k
        - *vm_stringer_ont
        
    podSpec:
      volumes:
        - name: lldap-ca
          configMap:
            name: lldap-ca
        - name: slurm-wrappers
          configMap:
            name: slurm-wrappers
            defaultMode: 0755
        - *vol_slurm_homes
        - *vol_davyjones_users
        - *vol_davyjones_shared
        - *vol_wallace_references
        - *vol_avon_novaseq6k
        - *vol_avon_nextseq2k
        - *vol_stringer_ont

# compute node config
nodesets:
  # disable default
  slinky:
    enabled: false

  # CPU nodes
  cpu:
    enabled: true
    replicas: 1
    updateStrategy:
      type: RollingUpdate
    slurmd:
      image:
        repository: ghcr.io/slinkyproject/slurmd-pyxis
        tag: 25.11-ubuntu24.04
      volumeMounts:
        - *vm_slurm_homes
        - *vm_davyjones_users
        - *vm_davyjones_shared
        - *vm_wallace_references
        - *vm_avon_novaseq6k
        - *vm_avon_nextseq2k
        - *vm_stringer_ont
    logfile:
      image:
        repository: docker.io/library/alpine
        tag: latest
    podSpec:
      nodeSelector:
        node-type: cpu
      volumes:
        - *vol_slurm_homes
        - *vol_davyjones_users
        - *vol_davyjones_shared
        - *vol_wallace_references
        - *vol_avon_novaseq6k
        - *vol_avon_nextseq2k
        - *vol_stringer_ont

  # GPU nodes - A6000 (loki)
  gpu-a6000:
    enabled: false
    replicas: 1
    updateStrategy:
      type: RollingUpdate
    slurmd:
      image:
        repository: ghcr.io/slinkyproject/slurmd-pyxis
        tag: 25.11-ubuntu24.04
      volumeMounts:
        - *vm_slurm_homes
        - *vm_davyjones_users
        - *vm_davyjones_shared
        - *vm_wallace_references
        - *vm_avon_novaseq6k
        - *vm_avon_nextseq2k
        - *vm_stringer_ont
      resources:
        limits:
          nvidia.com/gpu: 2
    extraConfMap:
      Gres: ["gpu:a6000:2"]
    logfile:
      image:
        repository: docker.io/library/alpine
        tag: latest
    podSpec:
      nodeSelector:
        node-type: gpu
      volumes:
        - *vol_slurm_homes
        - *vol_davyjones_users
        - *vol_davyjones_shared
        - *vol_wallace_references
        - *vol_avon_novaseq6k
        - *vol_avon_nextseq2k
        - *vol_stringer_ont
        # - *vol_af3_databases

  # GPU nodes - Blackwell (lusca)
  gpu-lusca:
    enabled: true
    replicas: 1
    updateStrategy:
      type: RollingUpdate
    slurmd:
      image:
        repository: ghcr.io/slinkyproject/slurmd-pyxis
        tag: 25.11-ubuntu24.04
      volumeMounts:
        - *vm_slurm_homes
        - *vm_davyjones_users
        - *vm_davyjones_shared
        - *vm_wallace_references
        - *vm_avon_novaseq6k
        - *vm_avon_nextseq2k
        - *vm_stringer_ont
        # - *vm_af3_databases
      resources:
        limits:
          nvidia.com/gpu: 10
    extraConfMap:
      Gres: ["gpu:blackwell:10"]
    logfile:
      image:
        repository: docker.io/library/alpine
        tag: latest
    podSpec:
      nodeSelector:
        node-type: gpu-lusca
      volumes:
        - *vol_slurm_homes
        - *vol_davyjones_users
        - *vol_davyjones_shared
        - *vol_wallace_references
        - *vol_avon_novaseq6k
        - *vol_avon_nextseq2k
        - *vol_stringer_ont
        # - *vol_af3_databases

partitions:
  # disable default
  all:
    enabled: false

  # setup default memory to scales with the num CPUs
  # default num CPUs is defined in the slurm wrappers configmap
  cpu:
    enabled: true
    nodesets:
      - cpu
    configMap:
      Default: "YES"
      DefMemPerCPU: 2048

  # define cpu / memory based on num GPUs
  gpu-a6000:
    enabled: false
    nodesets:
      - gpu-a6000
    configMap:
      DefCpuPerGPU: 8
      DefMemPerGPU: 32768

  # Blackwell GPUs (lusca) - AF3 workloads
  gpu-lusca:
    enabled: true
    nodesets:
      - gpu-lusca
    configMap:
      DefCpuPerGPU: 6
      DefMemPerGPU: 38400
