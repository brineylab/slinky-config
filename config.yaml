## slinky config file
# ref: https://github.com/SlinkyProject/slurm-operator/blob/main/helm/slurm/values.yaml

# shared volumeMounts
x-vm-slurm-homes: &vm_slurm_homes
  name: slurm-homes
  mountPath: /home
x-vm-davyjones-shared: &vm_davyjones_shared
  name: davyjones-shared
  mountPath: /data/shared
x-vm-af3-databases: &vm_af3_databases
  name: af3-databases
  mountPath: /mnt/af3_data

# shared volumes
x-vol-slurm-homes: &vol_slurm_homes
  name: slurm-homes
  persistentVolumeClaim:
    claimName: slurm-homes
x-vol-davyjones-shared: &vol_davyjones_shared
  name: davyjones-shared
  nfs:
    server: davyjones.scripps.edu
    path: /davyjones_data_zfspool/brineylab_shared
x-vol-af3-databases: &vol_af3_databases
  name: af3-databases
  hostPath:
    path: /mnt/af3_data
    type: Directory

# controller
controller:
  statefulset:
    persistence:
      storageClassName: nfs-legolas-jh
  podSpec:
    nodeSelector:
      node-type: controller
  extraConfMap:
    GresTypes: gpu
configFiles:
  # pyxis: configure plugstack.conf
  # ref: https://slinky.schedmd.com/projects/slurm-operator/en/release-1.0/usage/pyxis.html
  plugstack.conf: |
    include /usr/share/pyxis/*
  gres.conf: |
    AutoDetect=nvidia

# login node config
loginsets:
  slinky:
    enabled: true
    login:
      image:
        repository: ghcr.io/slinkyproject/login-pyxis  # pyxis-enabled image
      securityContext:
        privileged: true
      lifecycle:
        postStart:
          exec:
            command:
              - /bin/bash
              - -lc
              - |
                set -e

                # create user home dirs on first login
                if ! grep -q "pam_mkhomedir.so" /etc/pam.d/sshd; then
                  echo "session required pam_mkhomedir.so skel=/etc/skel umask=0077" >> /etc/pam.d/sshd
                fi

                # install pwquality & cracklib so users can change their password via passwd
                if command -v apt-get >/dev/null 2>&1; then
                  export DEBIAN_FRONTEND=noninteractive
                  apt-get update
                  apt-get install -y --no-install-recommends libpam-pwquality cracklib-runtime
                fi

      volumeMounts:
        - name: lldap-ca
          mountPath: /etc/ssl/certs/lldap-ca.crt
          subPath: lldap-ca.crt
          readOnly: true
        - name: slurm-wrappers
          mountPath: /usr/local/bin/srun
          subPath: srun
        - name: slurm-wrappers
          mountPath: /usr/local/bin/sbatch
          subPath: sbatch
        - *vm_slurm_homes
        - *vm_davyjones_shared
    podSpec:
      volumes:
        - name: lldap-ca
          configMap:
            name: lldap-ca
        - name: slurm-wrappers
          configMap:
            name: slurm-wrappers
            defaultMode: 0755
        - *vol_slurm_homes
        - *vol_davyjones_shared

# compute node config
nodesets:
  # disable default
  slinky:
    enabled: false

  # CPU nodes
  cpu:
    enabled: true
    replicas: 3
    updateStrategy:
      type: RollingUpdate
    slurmd:
      image:
        repository: ghcr.io/slinkyproject/slurmd-pyxis
        tag: 25.11-ubuntu24.04
      volumeMounts:
        - *vm_slurm_homes
        - *vm_davyjones_shared
    logfile:
      image:
        repository: docker.io/library/alpine
        tag: latest
    podSpec:
      nodeSelector:
        node-type: cpu
      volumes:
        - *vol_slurm_homes
        - *vol_davyjones_shared

  # GPU nodes - A6000 (loki)
  gpu-a6000:
    enabled: false
    replicas: 1
    updateStrategy:
      type: RollingUpdate
    slurmd:
      image:
        repository: ghcr.io/slinkyproject/slurmd-pyxis
        tag: 25.11-ubuntu24.04
      volumeMounts:
        - *vm_slurm_homes
        - *vm_davyjones_shared
      resources:
        limits:
          nvidia.com/gpu: 2
    extraConfMap:
      Gres: ["gpu:a6000:2"]
    logfile:
      image:
        repository: docker.io/library/alpine
        tag: latest
    podSpec:
      nodeSelector:
        node-type: gpu
      volumes:
        - *vol_slurm_homes
        - *vol_davyjones_shared

  # GPU nodes - Blackwell (lusca)
  gpu-lusca:
    enabled: true
    replicas: 1
    updateStrategy:
      type: RollingUpdate
    slurmd:
      image:
        repository: ghcr.io/slinkyproject/slurmd-pyxis
        tag: 25.11-ubuntu24.04
      volumeMounts:
        - *vm_slurm_homes
        - *vm_davyjones_shared
        - *vm_af3_databases
      resources:
        limits:
          nvidia.com/gpu: 10
    extraConfMap:
      Gres: ["gpu:blackwell:10"]
    logfile:
      image:
        repository: docker.io/library/alpine
        tag: latest
    podSpec:
      nodeSelector:
        node-type: gpu-lusca
      volumes:
        - *vol_slurm_homes
        - *vol_davyjones_shared
        - *vol_af3_databases

partitions:
  # disable default
  all:
    enabled: false

  # setup default memory to scales with the num CPUs
  # default num CPUs is defined in the slurm wrappers configmap
  cpu:
    enabled: true
    nodesets:
      - cpu
    configMap:
      Default: "YES"
      DefMemPerCPU: 2048

  # define cpu / memory based on num GPUs
  gpu-a6000:
    enabled: false
    nodesets:
      - gpu-a6000
    configMap:
      DefCpuPerGPU: 8
      DefMemPerGPU: 32768

  # Blackwell GPUs (lusca) - AF3 workloads
  gpu-lusca:
    enabled: true
    nodesets:
      - gpu-lusca
    configMap:
      DefCpuPerGPU: 6
      DefMemPerGPU: 38400
