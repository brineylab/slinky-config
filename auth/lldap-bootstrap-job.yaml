apiVersion: batch/v1
kind: Job
metadata:
  name: lldap-bootstrap
  namespace: lldap
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure

      volumes:
        - name: bootstrap
          configMap:
            name: lldap-bootstrap-files
            items:
              - key: bootstrap.sh
                path: bootstrap.sh
              - key: users.json
                path: user-configs/users.json
              - key: groups.json
                path: group-configs/groups.json
              - key: user-schema.json
                path: user-schemas/user-schema.json
              - key: group-schema.json
                path: group-schemas/group-schema.json
        - name: work
          emptyDir: {}

      containers:
        - name: bootstrap
          image: alpine:3.19
          volumeMounts:
            - name: bootstrap
              mountPath: /bootstrap
            - name: work
              mountPath: /work

          env:
            - name: LLDAP_URL
              value: "http://lldap:17170"
            - name: LLDAP_ADMIN_USERNAME
              value: "admin"
            - name: LLDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lldap-secret
                  key: LLDAP_LDAP_USER_PASS
            # delete users not present in the users.json file
            - name: DO_CLEANUP
              value: "true"

          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -e
              apk add --no-cache bash curl jq jo netcat-openbsd

              cp /bootstrap/bootstrap.sh /work/bootstrap.sh
              chmod +x /work/bootstrap.sh

              mkdir -p /work/user-configs
              i=0
              jq -c '.[]' /bootstrap/user-configs/users.json | while read -r obj; do
                i=$((i+1))
                printf '%s\n' "$obj" > "/work/user-configs/$(printf '%04d' "$i").json"
              done
              export USER_CONFIGS_DIR=/work/user-configs

              until nc -z lldap 17170; do sleep 2; done
              /work/bootstrap.sh