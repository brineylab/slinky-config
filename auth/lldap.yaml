---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lldap
  namespace: lldap
  labels:
    app: lldap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lldap
  template:
    metadata:
      labels:
        app: lldap
    spec:
      containers:
        - name: lldap
          image: lldap/lldap:stable
          ports:
            - name: ldap
              containerPort: 3890
            - name: ldaps
              containerPort: 6360
            - name: webui
              containerPort: 17170
          env:
            - name: LLDAP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lldap-secret
                  key: LLDAP_JWT_SECRET
            - name: LLDAP_LDAP_USER_PASS
              valueFrom:
                secretKeyRef:
                  name: lldap-secret
                  key: LLDAP_LDAP_USER_PASS
            - name: LLDAP_LDAP_BASE_DN
              value: "dc=cluster,dc=local"
            - name: LLDAP_LDAP_USER_DN
              value: "admin"
            - name: LLDAP_HTTP_URL
              value: "http://localhost:17170"

            # Enable LDAPS (TLS) listener
            # cert-manager Certificate should create secret: lldap-server-tls
            - name: LLDAP_LDAPS_OPTIONS__ENABLED
              value: "true"
            - name: LLDAP_LDAPS_OPTIONS__PORT
              value: "6360"
            - name: LLDAP_LDAPS_OPTIONS__CERT_FILE
              value: "/cert/tls.crt"
            - name: LLDAP_LDAPS_OPTIONS__KEY_FILE
              value: "/cert/tls.key"

          volumeMounts:
            - name: data
              mountPath: /data
            - name: lldap-server-tls
              mountPath: /cert
              readOnly: true

          readinessProbe:
            tcpSocket:
              port: 3890
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lldap-data
        - name: lldap-server-tls
          secret:
            secretName: lldap-server-tls
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key

---
apiVersion: v1
kind: Service
metadata:
  name: lldap
  namespace: lldap
spec:
  selector:
    app: lldap
  ports:
    - name: ldap
      port: 3890
      targetPort: 3890
    - name: ldaps
      port: 6360
      targetPort: 6360
    - name: webui
      port: 17170
      targetPort: 17170
