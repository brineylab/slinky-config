[sssd]
services = nss, pam, ssh
domains = cluster.local
config_file_version = 2

[domain/cluster.local]
id_provider = ldap
auth_provider = ldap
ldap_auth_disable_tls_never_use_in_production = true
ldap_uri = ldap://lldap.lldap.svc.cluster.local:3890
ldap_search_base = dc=cluster,dc=local
ldap_user_search_base = ou=people,dc=cluster,dc=local
ldap_group_search_base = ou=groups,dc=cluster,dc=local

# bind user
ldap_default_bind_dn = uid=sssd,ou=people,dc=cluster,dc=local
ldap_default_authtok_type = password
ldap_default_authtok = SSSD_BIND_PASSWORD_PLACEHOLDER

# user info
ldap_user_object_class = posixAccount
ldap_user_name = uid
ldap_user_uid_number = uidNumber
ldap_user_gid_number = gidNumber
ldap_user_ssh_public_key = sshPublicKey
fallback_homedir = /home/%u
default_shell = /bin/bash

# group info
ldap_schema = rfc2307bis
ldap_group_object_class = groupOfUniqueNames
ldap_group_member = uniqueMember
ldap_group_name = cn

ldap_tls_reqcert = never
cache_credentials = true
enumerate = true
entry_cache_timeout = 300