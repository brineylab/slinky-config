# avon-novaseq-nextseq.yaml
---
# avon sc
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-avon-hdd
provisioner: nfs.csi.k8s.io
reclaimPolicy: Delete
volumeBindingMode: Immediate

---
# novaseq pv
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-avon-novaseq6k
spec:
  capacity:
    storage: 100Ti
  accessModes:
    - ReadOnlyMany
  storageClassName: nfs-avon-hdd
  mountOptions:
    - hard
  nfs:
    server: avon.scripps.edu
    path: "/volume1/A01255/runs/run_data"

---
# novaseq pvc
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-avon-novaseq6k
  namespace: slurm
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: nfs-avon-hdd
  volumeName: nfs-avon-novaseq6k
  resources:
    requests:
      storage: 100Ti

---
# nextseq pv
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-avon-nextseq2k
spec:
  capacity:
    storage: 100Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-avon-hdd
  mountOptions:
    - hard
  nfs:
    server: avon.scripps.edu
    path: "/volume1/VH00124/runs/run_data"

---
# nextseq pvc
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-avon-nextseq2k
  namespace: slurm
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: nfs-avon-hdd
  volumeName: nfs-avon-nextseq2k
  resources:
    requests:
      storage: 100Ti
