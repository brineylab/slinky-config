# legolas-slinky.yaml
---
# default sc for cluster
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-legolas-jh
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: nfs.csi.k8s.io
parameters:
  server: 172.29.180.191 # legolas scripps ip
  share: /srv/nfs/slinky
reclaimPolicy: Retain
volumeBindingMode: Immediate
mountOptions:
  - hard

---
# slurm homes pvc
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: slurm-homes
  namespace: slurm
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-legolas-jh
  resources:
    requests:
      storage: 100Gi

---
# lldap pvc
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lldap-data
  namespace: lldap
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: nfs-legolas-jh
