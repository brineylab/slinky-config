apiVersion: v1
kind: ConfigMap
metadata:
  name: slurm-wrappers
  namespace: slurm
data:
  srun: |
    #!/usr/bin/env bash
    EXTRA=""
    SLURM_ARGS="$*"

    # Default container image
    if [[ "$SLURM_ARGS" != *"--container-image"* ]]; then
      EXTRA="$EXTRA --container-image=brineylab/datascience --container-name=briney-datascience"
    fi

    # Default CPUs per task (cpu partition only)
    if [[ "$SLURM_ARGS" != *"--partition=gpu"* ]] && [[ "$SLURM_ARGS" != *"-p gpu"* ]] && \
       [[ "$SLURM_ARGS" != *"--cpus-per-task"* ]] && [[ "$SLURM_ARGS" != *"-c "* ]]; then
      EXTRA="$EXTRA --cpus-per-task=16"
    fi

    # Always enforce required mounts, warn if user tried to set them
    if [[ "$SLURM_ARGS" == *"--container-mounts"* ]]; then
      echo "[srun wrapper] Warning: --container-mounts is managed by the cluster and cannot be overridden."
      set -- $(echo "$@" | sed 's/--container-mounts=[^ ]*//g')
    fi

    MOUNTS=/data/users/$(whoami):/home/jovyan/work,\
    /data/shared:/home/jovyan/shared:ro,\
    /data/references:/home/jovyan/references:ro,\
    /data/sequencing_runs/novaseq:/home/jovyan/sequencing_runs/novaseq:ro,\
    /data/sequencing_runs/nextseq:/home/jovyan/sequencing_runs/nextseq:ro,\
    /data/sequencing_runs/ont:/home/jovyan/sequencing_runs/ont:ro

    EXTRA="$EXTRA --container-mounts=$MOUNTS"

    exec /usr/bin/srun $EXTRA "$@"

  sbatch: |
    #!/usr/bin/env bash
    EXTRA=""
    SCRIPT="${@: -1}"
    SLURM_ARGS="$*"

    # Default container image (check CLI args and script #SBATCH directives)
    if [[ "$SLURM_ARGS" != *"--container-image"* ]] && ! grep -q "container-image" "$SCRIPT" 2>/dev/null; then
      EXTRA="$EXTRA --container-image=brineylab/datascience --container-name=briney-datascience"
    fi

    # Default CPUs per task (cpu partition only)
    if [[ "$SLURM_ARGS" != *"--partition=gpu"* ]] && [[ "$SLURM_ARGS" != *"-p gpu"* ]] && \
       [[ "$SLURM_ARGS" != *"--cpus-per-task"* ]] && [[ "$SLURM_ARGS" != *"-c "* ]] && \
       ! grep -q "cpus-per-task" "$SCRIPT" 2>/dev/null; then
      EXTRA="$EXTRA --cpus-per-task=16"
    fi

    # Always enforce required mounts, warn if user tried to set them
    if [[ "$SLURM_ARGS" == *"--container-mounts"* ]] || grep -q "container-mounts" "$SCRIPT" 2>/dev/null; then
      echo "[sbatch wrapper] Warning: --container-mounts is managed by the cluster and cannot be overridden."
      set -- $(echo "$@" | sed 's/--container-mounts=[^ ]*//g')
    fi

    MOUNTS=/data/users/$(whoami):/home/jovyan/work,\
    /data/shared:/home/jovyan/shared:ro,\
    /data/references:/home/jovyan/references:ro,\
    /data/sequencing_runs/novaseq:/home/jovyan/sequencing_runs/novaseq:ro,\
    /data/sequencing_runs/nextseq:/home/jovyan/sequencing_runs/nextseq:ro,\
    /data/sequencing_runs/ont:/home/jovyan/sequencing_runs/ont:ro

    EXTRA="$EXTRA --container-mounts=$MOUNTS"

    exec /usr/bin/sbatch $EXTRA "$@"